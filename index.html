  }).catch(e=>{

function fbListen(callback){

const DATA_VERSION = 13;

function toArray(val){
  // Firebase stores arrays as objects {0:..., 1:...} — convert back
  if(!val) return [];
  if(Array.isArray(val)) return val;
  return Object.keys(val).sort((a,b)=>parseInt(a)-parseInt(b)).map(k=>val[k]);
}

function applyData(d){
  if(!d) return;
  if(d.militanti){
    const arr = toArray(d.militanti);
    // Fix presenze inside each militante (also stored as object by Firebase)
    arr.forEach(m=>{
      if(m && m.presenze && !Array.isArray(m.presenze)){
        m.presenze = toArray(m.presenze);
      } else if(!m.presenze) {
        m.presenze = [];
      }
    });
    militanti = arr;
  }
  if(d.pesi) pesi=d.pesi;
  if(d.nextEventoId) nextEventoId=d.nextEventoId;
  if(d.nextMilitanteId) nextMilitanteId=d.nextMilitanteId;
  if(d.nextCompetenzaId) nextCompetenzaId=d.nextCompetenzaId;
  if(d.competenze){
    const arr = toArray(d.competenze);
    if(arr.length>0){
      COMPETENZE.length=0;
      arr.forEach(c=>COMPETENZE.push(c));
      COMPETENZE.forEach(c=>{if(!pesi[c.id])pesi[c.id]=c.peso;});
    }
  }
  if(d.dataVersion && d.dataVersion >= DATA_VERSION && d.eventi){
    eventi = toArray(d.eventi);
  }
}

function loadData(){
  fbListen(d=>{
    if(d && d.militanti){
      // Firebase ha dati: usa SEMPRE quelli, ignora il file
      applyData(d);
      localStorage.setItem('gdl_data', JSON.stringify(d));
      if(currentUser && !_localSaving) render();
    } else {
      // Firebase vuoto: primo avvio, carica dal file e salva su Firebase
      saveData();
      if(currentUser) render();
    }
  });
}

function saveData(){
  const payload = {militanti,eventi,pesi,nextEventoId,nextMilitanteId,competenze:COMPETENZE,nextCompetenzaId,dataVersion:DATA_VERSION};
  localStorage.setItem('gdl_data', JSON.stringify(payload));
  fbSave(payload);
}

function doLogout(){
  currentUser=null; currentRole=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
}

function showView(v){
  currentView=v; selectedMilitante=null;
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toLowerCase().startsWith(
      v==='classifica'?'class':v==='presenze'?'pres':'admin'
    ));
  });
  render();
}

function render(){
  const el=document.getElementById('main-content');
  if(selectedMilitante!==null){renderDetail(el);return;}
  if(currentView==='classifica') renderClassifica(el);
  else if(currentView==='presenze') renderPresenze(el);
  else if(currentView==='admin') renderAdmin(el);
}

function calcScore(m){
  let tot=0;
  COMPETENZE.forEach(c=>{tot+=(m.scores[c.id]||0)*(pesi[c.id]||1);});
  let presScore=m.presenze.length*10;
  return {raw:tot+presScore, presenze:m.presenze.length};
}

function getRanked(){
  return [...militanti].sort((a,b)=>calcScore(b).raw-calcScore(a).raw);
}

function calcMaxScore(){
  return COMPETENZE.reduce((a,c)=>a+(pesi[c.id]||1)*5,0);
}

function renderClassifica(el){
  const ranked=getRanked();
  const conPresenze=militanti.filter(m=>m.presenze.length>0).length;
  const maxS=calcScore(ranked[0]).raw||1;
  const dl=militanti.filter(m=>m.lista===LISTE[0]).length;
  const cg=militanti.filter(m=>m.lista===LISTE[1]).length;
  el.innerHTML=`
  <div class="metrics">
    <div class="metric"><div class="metric-label">Militanti totali</div><div class="metric-val">${militanti.length}</div></div>
    <div class="metric"><div class="metric-label">Con presenze</div><div class="metric-val">${conPresenze}</div></div>
    <div class="metric"><div class="metric-label">De Luca Sindaco di Sicilia</div><div class="metric-val" style="color:#C8191A">${dl}</div></div>
    <div class="metric"><div class="metric-label">Cateno per i Giovani</div><div class="metric-val" style="color:#C0158C">${cg}</div></div>
  </div>
  <div class="export-bar">
    <span>Classifica aggiornata in tempo reale — ${new Date().toLocaleDateString('it-IT')}</span>
    <button class="btn-sm" onclick="esportaCSV()">Esporta CSV</button>
  </div>
  <div class="filter-row">
    <input type="text" id="search-input" placeholder="Cerca militante..." oninput="filterRanking()">
    <select id="lista-fil" onchange="filterRanking()">
      <option value="">Tutte le liste</option>
      <option value="De Luca Sindaco di Sicilia">De Luca Sindaco di Sicilia</option>
      <option value="Cateno per i Giovani">Cateno per i Giovani</option>
    </select>
    <select id="sort-sel" onchange="filterRanking()">
      <option value="score">Per punteggio</option>
      <option value="nome">Per cognome</option>
      <option value="presenze">Per presenze</option>
    </select>
  </div>
  <p class="section-title">Classifica generale</p>
  <table><thead><tr>
    <th>#</th><th>Militante</th><th class="hide-mobile">Lista</th><th>Punti</th><th class="hide-mobile">Presenze</th><th class="hide-mobile">Andamento</th>
  </tr></thead><tbody id="ranking-body"></tbody></table>`;
  buildRankingRows(ranked,maxS);
}

function buildRankingRows(ranked,maxS){
  const body=document.getElementById('ranking-body');
  if(!body)return;
  body.innerHTML=ranked.map((m,i)=>{
    const s=calcScore(m);
    const pct=maxS>0?Math.round((s.raw/maxS)*100):0;
    const rClass=i===0?'rank1':i===1?'rank2':i===2?'rank3':'';
    const bClass=s.presenze>0?'badge badge-green':'badge badge-zero';
    const listaBadge=m.lista===LISTE[0]?'badge-dl':'badge-cg';
    const listaShort=m.lista===LISTE[0]?'DL Sindaco':'Cateno Giovani';
    return `<tr onclick="openDetail(${m.id})">
      <td class="rank-num ${rClass}">${i+1}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="avatar">${initials(m.cognome,m.nome)}</div>
        <div style="min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:120px">${toTitle(m.cognome)} ${toTitle(m.nome)}</div></div>
      </div></td>
      <td class="hide-mobile"><span class="${listaBadge}">${listaShort}</span></td>
      <td><strong>${s.raw}</strong> pt</td>
      <td class="hide-mobile"><span class="${bClass}">${s.presenze} ev.</span></td>
      <td class="hide-mobile"><div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div></td>
    </tr>`;
  }).join('');
}

function filterRanking(){
  const q=(document.getElementById('search-input')||{}).value||'';
  const sort=(document.getElementById('sort-sel')||{}).value||'score';
  const lista=(document.getElementById('lista-fil')||{}).value||'';
  let list=[...militanti];
  if(q) list=list.filter(m=>(m.cognome+' '+m.nome).toLowerCase().includes(q.toLowerCase()));
  if(lista) list=list.filter(m=>m.lista===lista);
  if(sort==='nome') list.sort((a,b)=>a.cognome.localeCompare(b.cognome));
  else if(sort==='presenze') list.sort((a,b)=>b.presenze.length-a.presenze.length);
  else list.sort((a,b)=>calcScore(b).raw-calcScore(a).raw);
  const maxS=calcScore(getRanked()[0]).raw||1;
  buildRankingRows(list,maxS);
}

function openDetail(id){selectedMilitante=id;render();}

function renderDetail(el){
  const m=militanti.find(x=>x.id===selectedMilitante);
  if(!m){el.innerHTML='';return;}
  const s=calcScore(m);
  const maxTot=calcMaxScore();
  const pct=maxTot>0?Math.round((s.raw/maxTot)*100):0;
  const ranked=getRanked();
  const pos=ranked.findIndex(x=>x.id===m.id)+1;
  const isAdmin=currentRole==='admin';
  el.innerHTML=`
  <button class="back-btn" onclick="selectedMilitante=null;render()">← Torna alla classifica</button>
  <div class="detail-header">
    <div class="detail-avatar">${initials(m.cognome,m.nome)}</div>
    <div style="flex:1">
      <div style="font-size:19px;font-weight:700">${toTitle(m.cognome)} ${toTitle(m.nome)}</div>
      <div style="font-size:13px;color:#666;margin:5px 0">
        Posizione in classifica: <strong>#${pos}</strong> &nbsp;|&nbsp;
        Punteggio: <strong>${s.raw} pt</strong> &nbsp;|&nbsp;
        Presenze: <strong>${s.presenze} eventi</strong>
      </div>
      <div style="margin-top:5px"><span class="${m.lista===LISTE[0]?'badge-dl':'badge-cg'}" style="font-size:12px;padding:3px 10px">${m.lista}</span></div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
        <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span style="font-size:12px;color:#888">${pct}% del massimo</span>
      </div>
    </div>
  </div>
  <div class="panel-grid">
    <div class="card">
      <p class="section-title" style="margin-bottom:12px">Valutazione 13 competenze</p>
      ${COMPETENZE.map(c=>`
      <div class="competenza-row">
        <div class="competenza-label" title="${c.label}">${c.label}</div>
        <div class="star-row" id="stars-${c.id}">
          ${[1,2,3,4,5].map(v=>`<span class="star ${(m.scores[c.id]||0)>=v?'on':''}" 
            ${isAdmin?`onclick="setStar(${m.id},'${c.id}',${v})"`:''} 
            style="${!isAdmin?'cursor:default':''}">&#9733;</span>`).join('')}
        </div>
        <span class="peso-badge">x${pesi[c.id]}</span>
      </div>`).join('')}
      ${isAdmin?`
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f0f0f0">
        <label class="form-label">Note interne</label>
        <textarea placeholder="Annotazioni su questo militante..." 
          oninput="saveNote(${m.id},this.value)">${m.note||''}</textarea>
      </div>`:`<div style="background:#fffbe6;border-radius:6px;padding:8px 12px;font-size:12px;color:#856404;margin-top:10px">Visualizzazione in sola lettura. Contatta l'admin per modifiche.</div>`}
    </div>
    <div class="card">
      <p class="section-title" style="margin-bottom:12px">Presenze agli eventi</p>
      ${eventi.length===0?'<p style="font-size:13px;color:#aaa">Nessun evento registrato.</p>':
      eventi.map(e=>{
        const present=m.presenze.includes(e.id);
        return `<div class="evento-row">
          <div>
            <div style="font-size:13px;font-weight:600">${e.tipo}</div>
            <div style="font-size:11px;color:#888">${e.data} — ${e.luogo}</div>
          </div>
          <button class="check-btn ${present?'checked':''}" 
            ${isAdmin?`onclick="togglePresenza(${m.id},${e.id})"`:''} 
            style="${!isAdmin?'cursor:default':''}">${present?'✓':''}</button>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function setStar(mid,cid,val){
  if(currentRole!=='admin')return;
  const m=militanti.find(x=>x.id===mid);
  if(!m)return;
  m.scores[cid]=(m.scores[cid]===val)?0:val;
  saveData();
  renderDetail(document.getElementById('main-content'));
}
function saveNote(mid,val){
  militanti.find(x=>x.id===mid).note=val;
  saveData();
}
function togglePresenza(mid,eid){
  if(currentRole!=='admin')return;
  const m=militanti.find(x=>x.id===mid);
  if(!m)return;
  if(m.presenze.includes(eid)) m.presenze=m.presenze.filter(x=>x!==eid);
  else m.presenze.push(eid);
  saveData();
  renderDetail(document.getElementById('main-content'));
}

function renderPresenze(el){
  el.innerHTML=`
  <div class="tabs-inner">
    <button class="tab-inner active" onclick="presTab('lista',this)">Lista eventi</button>
    ${currentRole==='admin'?'<button class="tab-inner" onclick="presTab(\'nuovo\',this)">Nuovo evento</button>':''}
    <button class="tab-inner" onclick="presTab('registro',this)">Registro presenze</button>
  </div>
  <div id="presenze-body"></div>`;
  presTab('lista',el.querySelector('.tab-inner.active'));
}

function showEventoDetail(eid){
  const e = eventi.find(x=>x.id===eid);
  if(!e) return;
  const presenti = militanti.filter(m=>m.presenze.includes(eid))
    .sort((a,b)=>a.cognome.localeCompare(b.cognome));
  const assenti = militanti.filter(m=>!m.presenze.includes(eid))
    .sort((a,b)=>a.cognome.localeCompare(b.cognome));
  const el = document.getElementById('evento-detail');
  if(!el) return;
  el.style.display='block';
  el.innerHTML=`
    <div style="background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:15px;font-weight:700;color:#C8191A">${e.data} — ${e.tipo}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">${e.luogo} &nbsp;|&nbsp; ${presenti.length} presenti su ${militanti.length}</div>
        </div>
        <button class="btn-sm" onclick="document.getElementById('evento-detail').style.display='none'">✕ Chiudi</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px" class="panel-grid">
        <div>
          <p class="section-title" style="margin-bottom:10px;color:#27500A">✓ Presenti (${presenti.length})</p>
          <table><thead><tr><th>#</th><th>Nominativo</th><th class="hide-mobile">Lista</th></tr></thead><tbody>
          ${presenti.map((m,i)=>{
            const lb=m.lista===LISTE[0]?'badge-dl':'badge-cg';
            const ls=m.lista===LISTE[0]?'DL':'CG';
            return `<tr>
              <td style="color:#888;font-size:12px">${i+1}</td>
              <td style="font-weight:500">${toTitle(m.cognome)} ${toTitle(m.nome)}</td>
              <td class="hide-mobile"><span class="${lb}">${ls}</span></td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
        <div>
          <p class="section-title" style="margin-bottom:10px;color:#791F1F">✗ Assenti (${assenti.length})</p>
          <table><thead><tr><th>#</th><th>Nominativo</th><th class="hide-mobile">Lista</th></tr></thead><tbody>
          ${assenti.map((m,i)=>{
            const lb=m.lista===LISTE[0]?'badge-dl':'badge-cg';
            const ls=m.lista===LISTE[0]?'DL':'CG';
            return `<tr>
              <td style="color:#888;font-size:12px">${i+1}</td>
              <td style="color:#999">${toTitle(m.cognome)} ${toTitle(m.nome)}</td>
              <td class="hide-mobile"><span class="${lb}">${ls}</span></td>
            </tr>`;
          }).join('')}
          </tbody></table>
        </div>
      </div>
    </div>`;
  // Scroll to detail
  el.scrollIntoView({behavior:'smooth', block:'start'});
}

function presTab(t,btn){
  if(btn){document.querySelectorAll('.tab-inner').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const el=document.getElementById('presenze-body');
  if(!el)return;
  if(t==='lista'){
    el.innerHTML=eventi.length===0?'<p style="font-size:13px;color:#aaa">Nessun evento ancora.</p>':`
    <p style="font-size:12px;color:#888;margin-bottom:10px">Clicca su un evento per vedere i presenti</p>
    <table><thead><tr><th>Data</th><th>Tipo</th><th class="hide-mobile">Luogo</th><th>Presenti</th></tr></thead><tbody>
    ${eventi.map(e=>{
      const cnt=militanti.filter(m=>m.presenze.includes(e.id)).length;
      return `<tr onclick="showEventoDetail(${e.id})" style="cursor:pointer">
        <td>${e.data}</td><td>${e.tipo}</td><td class="hide-mobile">${e.luogo}</td>
        <td><span class="badge badge-blue">${cnt} / ${militanti.length}</span></td></tr>`;
    }).join('')}</tbody></table>
    <div id="evento-detail" style="display:none;margin-top:20px"></div>`;
  } else if(t==='nuovo'){
    el.innerHTML=`
    <div class="card" style="max-width:440px">
      <p class="section-title" style="margin-bottom:14px">Aggiungi nuovo evento</p>
      <div class="form-group"><label class="form-label">Tipo evento</label>
        <select id="ev-tipo">
          <option>Riunione organizzativa</option>
          <option>Evento formativo</option>
          <option>Organizzazione evento</option>
          <option>Seminario</option>
          <option>Assemblea pubblica</option>
          <option>Altro</option>
        </select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Data (AAAA-MM-GG)</label>
          <input type="text" id="ev-data" placeholder="2025-06-01"></div>
        <div class="form-group"><label class="form-label">Luogo</label>
          <input type="text" id="ev-luogo" placeholder="Sede Messina"></div>
      </div>
      <button class="btn-primary" onclick="addEvento()">Aggiungi evento</button>
      <div id="ev-alert" class="hidden"></div>
    </div>`;
  } else {
    if(eventi.length===0){el.innerHTML='<p style="font-size:13px;color:#aaa">Crea prima un evento.</p>';return;}
    el.innerHTML=`
    <div class="form-group" style="max-width:360px"><label class="form-label">Seleziona evento</label>
      <select id="reg-evento" onchange="renderRegMilitanti()">${eventi.map(e=>`<option value="${e.id}">${e.data} — ${e.tipo}</option>`).join('')}</select></div>
    ${currentRole==='admin'?`<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <button class="btn-sm" onclick="segnaAll(true)">Segna tutti presenti</button>
      <button class="btn-sm" onclick="segnaAll(false)">Azzera presenze</button>
    </div>`:''}
    <div id="reg-list"></div>`;
    renderRegMilitanti();
  }
}

function addEvento(){
  const tipo=document.getElementById('ev-tipo').value;
  const data=document.getElementById('ev-data').value.trim();
  const luogo=document.getElementById('ev-luogo').value.trim();
  const a=document.getElementById('ev-alert');
  if(!data||!luogo){a.className='alert alert-error';a.textContent='Compila data e luogo.';return;}
  eventi.push({id:nextEventoId++,data,tipo,luogo});
  saveData();
  a.className='alert alert-success';a.textContent='Evento aggiunto.';
  setTimeout(()=>{presTab('lista');renderPresenze(document.getElementById('main-content'));},1000);
}

function renderRegMilitanti(){
  const eid=parseInt((document.getElementById('reg-evento')||{}).value||eventi[0]?.id);
  _rebuildRegList(eid);
}

function togglePresReg(mid,eid){
  if(currentRole!=='admin')return;
  const m=militanti.find(x=>x.id===mid);
  if(m.presenze.includes(eid)) m.presenze=m.presenze.filter(x=>x!==eid);
  else m.presenze.push(eid);
  saveData();
  // Only rebuild the militanti list, don't re-render the whole view
  _rebuildRegList(eid);
}

function _rebuildRegList(eid){
  const el=document.getElementById('reg-list');
  if(!el)return;
  const isAdmin=currentRole==='admin';
  const sorted=[...militanti].sort((a,b)=>a.cognome.localeCompare(b.cognome));
  const presenti=sorted.filter(m=>m.presenze.includes(eid)).length;
  el.innerHTML=`<div style="margin-bottom:10px;font-size:13px;color:#666">Presenti: <strong>${presenti}</strong> su ${militanti.length}</div>
  <table><thead><tr><th>Militante</th><th>Presente</th></tr></thead><tbody>
  ${sorted.map(m=>{
    const present=m.presenze.includes(eid);
    return `<tr>
      <td>${toTitle(m.cognome)} ${toTitle(m.nome)}</td>
      <td><button class="check-btn ${present?'checked':''}" 
        ${isAdmin?`onclick="togglePresReg(${m.id},${eid})"`:''} 
        style="${!isAdmin?'cursor:default':''}">${present?'✓':''}</button></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function segnaAll(v){
  if(currentRole!=='admin')return;
  const eid=parseInt((document.getElementById('reg-evento')||{}).value||eventi[0]?.id);
  militanti.forEach(m=>{
    if(v&&!m.presenze.includes(eid)) m.presenze.push(eid);
    else if(!v) m.presenze=m.presenze.filter(x=>x!==eid);
  });
  saveData();
  _rebuildRegList(eid);
}

function renderAdmin(el){
  if(currentRole!=='admin'){el.innerHTML='<p style="color:#a00">Accesso negato.</p>';return;}
  el.innerHTML=`
  <div class="tabs-inner">
    <button class="tab-inner active" onclick="adminTab('valutazioni',this)">Valutazioni</button>
    <button class="tab-inner" onclick="adminTab('membri',this)">Gestione membri</button>
    <button class="tab-inner" onclick="adminTab('competenze',this)">Competenze e pesi</button>
  </div>
  <div id="admin-body-wrap"></div>`;
  adminTab('valutazioni', el.querySelector('.tab-inner.active'));
}

function adminTab(t, btn){
  if(btn){document.querySelectorAll('.tab-inner').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  const wrap=document.getElementById('admin-body-wrap');
  if(!wrap)return;
  if(t==='valutazioni'){
    const sorted=[...militanti].sort((a,b)=>a.cognome.localeCompare(b.cognome));
    wrap.innerHTML=`
    <div class="export-bar">
      <span>Modifica schede e valutazioni</span>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="esportaCSV()">Esporta CSV</button>
        <button class="btn-sm" onclick="resetConfirm()">Reset dati</button>
      </div>
    </div>
    <div class="filter-row"><input type="text" id="admin-search" placeholder="Cerca..." oninput="adminFilter()"></div>
    <table><thead><tr><th>Militante</th><th class="hide-mobile">Lista</th><th>Punti</th><th class="hide-mobile">Presenze</th><th class="hide-mobile">Completamento</th><th></th></tr></thead>
    <tbody id="admin-val-body"></tbody></table>`;
    buildAdminValBody(sorted);
  } else if(t==='membri'){
    renderGestioneMembri(wrap);
  } else {
    renderGestioneCompetenze(wrap);
  }
}

function buildAdminValBody(list){
  const body=document.getElementById('admin-val-body');
  if(!body)return;
  const maxC=COMPETENZE.length;
  body.innerHTML=list.map(m=>{
    const s=calcScore(m);
    const filled=COMPETENZE.filter(c=>(m.scores[c.id]||0)>0).length;
    const pct=Math.round((filled/maxC)*100);
    const lb=m.lista===LISTE[0]?'badge-dl':'badge-cg';
    const ls=m.lista===LISTE[0]?'DL Sindaco':'Cateno Giovani';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="avatar">${initials(m.cognome,m.nome)}</div>
        <span>${toTitle(m.cognome)} ${toTitle(m.nome)}</span>
      </div></td>
      <td class="hide-mobile"><span class="${lb}">${ls}</span></td>
      <td><strong>${s.raw}</strong> pt</td>
      <td class="hide-mobile">${s.presenze}</td>
      <td class="hide-mobile"><div style="display:flex;align-items:center;gap:8px">
        <div class="progress-wrap" style="width:70px"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span style="font-size:11px;color:#aaa">${filled}/${maxC}</span>
      </div></td>
      <td><button class="btn-sm" onclick="selectedMilitante=${m.id};render()">Modifica</button></td>
    </tr>`;
  }).join('');
}

function adminFilter(){
  const q=(document.getElementById('admin-search')||{}).value||'';
  let list=[...militanti].sort((a,b)=>a.cognome.localeCompare(b.cognome));
  if(q) list=list.filter(m=>(m.cognome+' '+m.nome).toLowerCase().includes(q.toLowerCase()));
  buildAdminValBody(list);
}

function renderGestioneMembri(wrap){
  const sorted=[...militanti].sort((a,b)=>a.cognome.localeCompare(b.cognome));
  wrap.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px" class="panel-grid">
    <div class="card">
      <p class="section-title" style="margin-bottom:12px">Aggiungi nuovo membro</p>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Cognome</label><input type="text" id="new-cognome" placeholder="Cognome"></div>
        <div class="form-group"><label class="form-label">Nome</label><input type="text" id="new-nome" placeholder="Nome"></div>
      </div>
      <div class="form-group"><label class="form-label">Lista di appartenenza</label>
        <select id="new-lista">
          <option value="De Luca Sindaco di Sicilia">De Luca Sindaco di Sicilia</option>
          <option value="Cateno per i Giovani">Cateno per i Giovani</option>
        </select>
      </div>
      <button class="btn-primary" onclick="aggiungiMembro()">Aggiungi membro</button>
      <div id="new-alert" style="display:none" class="alert"></div>
    </div>
    <div class="card" style="background:#fffbe6;border-color:#f0d060">
      <p class="section-title" style="margin-bottom:8px">Info</p>
      <p style="font-size:13px;color:#666;line-height:1.6">Puoi aggiungere nuovi membri, modificare nome/cognome/lista, o rimuovere un membro.<br><br>La rimozione elimina anche tutte le valutazioni e presenze del membro.</p>
    </div>
  </div>
  <p class="section-title" style="margin-bottom:10px">Membri registrati (${militanti.length})</p>
  <div class="filter-row"><input type="text" id="gestione-search" placeholder="Cerca membro..." oninput="filterGestione()"></div>
  <table><thead><tr><th>Cognome</th><th>Nome</th><th>Lista</th><th>Azioni</th></tr></thead>
  <tbody id="gestione-body"></tbody></table>`;
  buildGestioneBody(sorted);
}

function buildGestioneBody(list){
  const body=document.getElementById('gestione-body');
  if(!body)return;
  body.innerHTML=list.map(m=>`<tr id="row-${m.id}">
    <td><input type="text" value="${m.cognome.replace(/"/g,'&quot;')}" 
      onchange="aggiornaMembro(${m.id},'cognome',this.value)" style="width:100%;min-width:100px"></td>
    <td><input type="text" value="${m.nome.replace(/"/g,'&quot;')}" 
      onchange="aggiornaMembro(${m.id},'nome',this.value)" style="width:100%;min-width:100px"></td>
    <td><select onchange="aggiornaMembro(${m.id},'lista',this.value)" style="min-width:160px">
      <option value="De Luca Sindaco di Sicilia" ${m.lista==='De Luca Sindaco di Sicilia'?'selected':''}>De Luca Sindaco di Sicilia</option>
      <option value="Cateno per i Giovani" ${m.lista==='Cateno per i Giovani'?'selected':''}>Cateno per i Giovani</option>
    </select></td>
    <td><button class="btn-sm" style="color:#a00;border-color:#f5c6c6" onclick="rimuoviMembro(${m.id})">Rimuovi</button></td>
  </tr>`).join('');
}

function filterGestione(){
  const q=(document.getElementById('gestione-search')||{}).value||'';
  let list=[...militanti].sort((a,b)=>a.cognome.localeCompare(b.cognome));
  if(q) list=list.filter(m=>(m.cognome+' '+m.nome).toLowerCase().includes(q.toLowerCase()));
  buildGestioneBody(list);
}

function aggiungiMembro(){
  const cognome=(document.getElementById('new-cognome')||{}).value.trim();
  const nome=(document.getElementById('new-nome')||{}).value.trim();
  const lista=(document.getElementById('new-lista')||{}).value;
  const a=document.getElementById('new-alert');
  if(!cognome||!nome){
    a.style.display='block';a.className='alert alert-error';a.textContent='Inserisci cognome e nome.';return;
  }
  let scores={};COMPETENZE.forEach(c=>{scores[c.id]=0;});
  militanti.push({id:nextMilitanteId++,cognome,nome,lista,scores,presenze:[],note:''});
  saveData();
  a.style.display='block';a.className='alert alert-success';
  a.textContent=toTitle(cognome)+' '+toTitle(nome)+' aggiunto.';
  document.getElementById('new-cognome').value='';
  document.getElementById('new-nome').value='';
  setTimeout(()=>{
    const wrap=document.getElementById('admin-body-wrap');
    if(wrap)renderGestioneMembri(wrap);
  },800);
}

function aggiornaMembro(id,campo,val){
  const m=militanti.find(x=>x.id===id);
  if(m){m[campo]=val;saveData();}
}

function rimuoviMembro(id){
  const m=militanti.find(x=>x.id===id);
  if(!m)return;
  if(confirm('Rimuovere '+toTitle(m.cognome)+' '+toTitle(m.nome)+'? Tutti i dati verranno eliminati.')){
    militanti=militanti.filter(x=>x.id!==id);
    saveData();
    const wrap=document.getElementById('admin-body-wrap');
    if(wrap)renderGestioneMembri(wrap);
  }
}



let nextCompetenzaId = COMPETENZE.length + 1;

function renderGestioneCompetenze(wrap){
  wrap.innerHTML=`
  <p style="font-size:13px;color:#666;margin-bottom:16px">Modifica il titolo o il peso di ogni competenza, aggiungine di nuove, o rimuovile. Il punteggio = stelle (1–5) × peso. Ogni presenza vale 10 punti fissi.</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px" class="panel-grid">
    <div class="card">
      <p class="section-title" style="margin-bottom:12px">Aggiungi nuova competenza</p>
      <div class="form-group"><label class="form-label">Titolo competenza</label>
        <input type="text" id="new-comp-label" placeholder="Es. Presenza sui social media"></div>
      <div class="form-group"><label class="form-label">Peso (1–10)</label>
        <input type="number" id="new-comp-peso" min="1" max="10" value="7" style="width:80px"></div>
      <button class="btn-primary" onclick="aggiungiCompetenza()">Aggiungi competenza</button>
      <div id="new-comp-alert" style="display:none" class="alert"></div>
    </div>
    <div class="card" style="background:#fffbe6;border-color:#f0d060">
      <p class="section-title" style="margin-bottom:8px">Info punteggio</p>
      <p style="font-size:13px;color:#666;line-height:1.6">
        Punteggio max teorico (senza presenze):<br>
        <strong id="max-score-label" style="font-size:18px;color:#185FA5">${calcMaxScore()}</strong> pt<br><br>
        Rimuovere una competenza azzera i voti già assegnati per quella voce.
      </p>
    </div>
  </div>
  <p class="section-title" style="margin-bottom:10px">Competenze attive (${COMPETENZE.length})</p>
  <table><thead><tr><th style="width:50%">Titolo</th><th style="width:100px">Peso</th><th></th></tr></thead>
  <tbody id="comp-body"></tbody></table>`;
  buildCompetenzaBody();
}

function buildCompetenzaBody(){
  const body=document.getElementById('comp-body');
  if(!body)return;
  body.innerHTML=COMPETENZE.map((c,i)=>`<tr id="comp-row-${c.id}">
    <td><input type="text" value="${c.label.replace(/"/g,'&quot;')}"
      onchange="aggiornaCompetenza('${c.id}','label',this.value)"
      style="width:100%"></td>
    <td><input type="number" value="${pesi[c.id]||1}" min="1" max="10"
      oninput="aggiornaCompetenza('${c.id}','peso',this.value)"
      style="width:70px;text-align:center"></td>
    <td><button class="btn-sm" style="color:#a00;border-color:#f5c6c6"
      onclick="rimuoviCompetenza('${c.id}')"
      ${COMPETENZE.length<=1?'disabled title="Deve restare almeno 1 competenza"':''}
      >Rimuovi</button></td>
  </tr>`).join('');
  const el=document.getElementById('max-score-label');
  if(el) el.textContent=calcMaxScore();
}

function aggiornaCompetenza(cid,campo,val){
  const c=COMPETENZE.find(x=>x.id===cid);
  if(!c)return;
  if(campo==='label'){
    c.label=val;
  } else {
    const n=Math.min(10,Math.max(1,parseInt(val)||1));
    c.peso=n; pesi[cid]=n;
  }
  saveData();
  const el=document.getElementById('max-score-label');
  if(el) el.textContent=calcMaxScore();
}

function aggiungiCompetenza(){
  const label=(document.getElementById('new-comp-label')||{}).value.trim();
  const peso=Math.min(10,Math.max(1,parseInt((document.getElementById('new-comp-peso')||{}).value)||7));
  const a=document.getElementById('new-comp-alert');
  if(!label){a.style.display='block';a.className='alert alert-error';a.textContent='Inserisci un titolo.';return;}
  const newId='c'+nextCompetenzaId++;
  COMPETENZE.push({id:newId,label,peso});
  pesi[newId]=peso;
  militanti.forEach(m=>{m.scores[newId]=0;});
  saveData();
  document.getElementById('new-comp-label').value='';
  a.style.display='block';a.className='alert alert-success';a.textContent='Competenza aggiunta.';
  setTimeout(()=>{
    const wrap=document.getElementById('admin-body-wrap');
    if(wrap)renderGestioneCompetenze(wrap);
  },700);
}

function rimuoviCompetenza(cid){
  if(COMPETENZE.length<=1){alert('Deve restare almeno una competenza.');return;}
  const c=COMPETENZE.find(x=>x.id===cid);
  if(!c)return;
  if(confirm('Rimuovere la competenza "'+c.label+'"? I voti assegnati per questa voce verranno azzerati.')){
    const idx=COMPETENZE.findIndex(x=>x.id===cid);
    COMPETENZE.splice(idx,1);
    delete pesi[cid];
    militanti.forEach(m=>{delete m.scores[cid];});
    saveData();
    const wrap=document.getElementById('admin-body-wrap');
    if(wrap)renderGestioneCompetenze(wrap);
  }
}

function esportaCSV(){
  const ranked=getRanked();
  let csv='Posizione,Cognome,Nome,Lista,Punteggio Totale,Presenze';
  COMPETENZE.forEach(c=>{csv+=','+c.label.replace(/,/g,' ');});
  csv+='\n';
  ranked.forEach((m,i)=>{
    const s=calcScore(m);
    csv+=`${i+1},"${m.cognome}","${m.nome}","${m.lista||''}",${s.raw},${s.presenze}`;
    COMPETENZE.forEach(c=>{csv+=','+(m.scores[c.id]||0);});
    csv+='\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='classifica_gdl_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(url);
}

function resetConfirm(){
  if(confirm('Sei sicuro di voler azzerare TUTTI i dati di valutazione? Questa operazione non può essere annullata.')){
    militanti.forEach(m=>{
      COMPETENZE.forEach(c=>{m.scores[c.id]=0;});
      m.presenze=[];m.note='';
    });
    saveData();
    alert('Dati azzerati.');
    render();
  }
}
